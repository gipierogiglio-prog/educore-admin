<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduCore - Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,system-ui,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:.2s}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-danger{background:#dc2626;color:#fff}.btn-success{background:#16a34a;color:#fff}
.btn-outline{background:transparent;border:1px solid #cbd5e1;color:#475569}
.card{background:#fff;border-radius:8px;border:1px solid #e2e8f0;padding:24px}
.input{width:100%;padding:8px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px}
table{width:100%;border-collapse:collapse}
td,th{padding:12px 8px;text-align:left;border-bottom:1px solid #f1f5f9;font-size:14px}
th{color:#64748b;font-weight:500}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:500}
.badge-active{background:#dcfce7;color:#166534}
.badge-inactive{background:#fee2e2;color:#991b1b}
.badge-suspended{background:#fef3c7;color:#92400e}
.login-screen{display:flex;height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a8a,#2563eb)}
.login-card{background:#fff;border-radius:8px;padding:32px;width:400px;max-width:90vw}
.login-card h1{font-size:1.5rem;margin-bottom:4px}
.login-card p{color:#64748b;font-size:0.875rem;margin-bottom:24px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:0.875rem;font-weight:500;margin-bottom:4px}
.form-group input{width:100%}
.error-msg{background:#fee2e2;color:#991b1b;padding:8px 12px;border-radius:6px;margin-bottom:12px;font-size:0.875rem}
.dashboard{padding:24px;max-width:1200px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.header h1{font-size:1.5rem}
.header p{color:#64748b;font-size:0.875rem}
.stats{display:flex;gap:16px;margin-bottom:24px}
.stat-card{flex:1}
.stat-card p:first-child{font-size:0.875rem;color:#64748b}
.stat-card p:last-child{font-size:1.5rem;font-weight:700}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid .full{grid-column:1/-1}
.mt-2{margin-top:8px}
.mb-3{margin-bottom:16px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const API = ''
let token = localStorage.getItem('admin_token')

function apiFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' }
  if (token) headers['Authorization'] = 'Bearer ' + token
  return fetch(API + path, { ...opts, headers })
    .then(res => {
      if (res.status === 401) { token = null; localStorage.removeItem('token'); render() }
      return res.json().then(data => { if (!res.ok) throw new Error(data.message || 'Erro'); return data })
    })
}

const statusLabels = { active: 'Ativo', inactive: 'Inativo', suspended: 'Suspenso' }
const badgeClass = s => s === 'active' ? 'badge-active' : s === 'inactive' ? 'badge-inactive' : 'badge-suspended'

// --- Login Screen ---
function renderLogin() {
  const root = document.getElementById('root')
  root.innerHTML = ''
  const screen = ce('div', { className: 'login-screen' })
  const card = ce('div', { className: 'login-card' })
  card.innerHTML = `
    <h1>EduCore Admin</h1>
    <p>Painel de gerenciamento</p>
    <div id="login-error"></div>
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input class="input" id="login-email" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input class="input" id="login-pass" type="password" placeholder="sua senha" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">Entrar</button>
    </form>
  `
  screen.appendChild(card)
  root.appendChild(screen)

  document.getElementById('login-form').onsubmit = async e => {
    e.preventDefault()
    const email = document.getElementById('login-email').value
    const pass = document.getElementById('login-pass').value
    try {
      const res = await apiFetch('/api/auth/login', { method: 'POST', body: JSON.stringify({ email, password: pass }) })
      token = res.token
      localStorage.setItem('admin_token', res.token)
      render()
    } catch (e) {
      document.getElementById('login-error').innerHTML = '<div class="error-msg">' + e.message + '</div>'
    }
  }
}

// --- Dashboard ---
function renderDashboard() {
  const root = document.getElementById('root')
  root.innerHTML = ''

  const dash = ce('div', { className: 'dashboard' })
  dash.innerHTML = `
    <div class="header">
      <div>
        <h1>EduCore Admin</h1>
        <p>Gerencie as escolas cadastradas</p>
      </div>
      <button class="btn btn-outline" onclick="logout()">Sair</button>
    </div>
    <div class="stats">
      <div class="card stat-card"><p>Total Escolas</p><p id="stat-total">-</p></div>
      <div class="card stat-card"><p>Escolas Ativas</p><p id="stat-active" style="color:#166534;font-weight:700">-</p></div>
    </div>
    <button class="btn btn-primary mb-3" onclick="toggleForm()" id="btn-new">Nova Escola</button>
    <div id="org-form" style="display:none"></div>
    <div class="card" id="org-table"><p style="color:#64748b;text-align:center;padding:24px">Carregando...</p></div>
  `
  root.appendChild(dash)
  loadData()
}

function loadData() {
  apiFetch('/api/organizations').then(orgs => {
    apiFetch('/api/stats').then(stats => {
      document.getElementById('stat-total').textContent = stats.totalOrgs
      document.getElementById('stat-active').textContent = stats.activeOrgs
    }).catch(() => {})
    renderTable(orgs)
  }).catch(() => {})
}

function renderTable(orgs) {
  const container = document.getElementById('org-table')
  if (!orgs.length) {
    container.innerHTML = '<p style="color:#64748b;text-align:center;padding:24px">Nenhuma escola cadastrada ainda.</p>'
    return
  }
  let html = '<table><thead><tr><th>Escola</th><th>Slug</th><th>CNPJ</th><th>Criada em</th><th>Status</th><th>Ações</th></tr></thead><tbody>'
  orgs.forEach(o => {
    const date = new Date(o.createdAt).toLocaleDateString('pt-BR')
    const badge = '<span class="badge ' + badgeClass(o.status) + '">' + (statusLabels[o.status] || o.status) + '</span>'
    const btnClass = o.status === 'active' ? 'btn-danger' : 'btn-success'
    const btnText = o.status === 'active' ? 'Desativar' : 'Ativar'
    html += '<tr><td style="font-weight:500">' + o.name + '</td><td style="font-family:monospace;font-size:0.875rem;color:#64748b">' + o.slug + '</td><td>' + (o.document || '-') + '</td><td>' + date + '</td><td>' + badge + '</td>'
    html += '<td><button class="btn ' + btnClass + '" style="font-size:0.8rem;padding:4px 12px" onclick="toggleStatus(\'' + o.id + '\',\'' + o.status + '\')">' + btnText + '</button></td></tr>'
  })
  html += '</tbody></table>'
  container.innerHTML = html
}

window.toggleStatus = async (id, status) => {
  const newStatus = status === 'active' ? 'inactive' : 'active'
  try {
    await apiFetch('/api/organizations/' + id + '/status?status=' + newStatus, { method: 'PATCH' })
    loadData()
  } catch (e) { alert(e.message) }
}

window.toggleForm = () => {
  const form = document.getElementById('org-form')
  const btn = document.getElementById('btn-new')
  if (form.style.display !== 'block') {
    form.style.display = 'block'
    btn.textContent = 'Cancelar'
    form.innerHTML = `
      <div class="card mb-3">
        <h3 style="margin-bottom:16px">Nova Escola</h3>
        <form id="create-form">
          <div class="form-grid">
            <div class="form-group"><label>Nome</label><input class="input" id="f-name" oninput="document.getElementById('f-slug').value=gerarSlug(this.value)" required></div>
            <div class="form-group"><label>Slug</label><input class="input" id="f-slug" placeholder="ex: minha-escola" required>
            <small style="color:#64748b;font-size:0.75rem">Identificador único para URL (apenas letras, números e hífens)</small></div>
            <div class="form-group"><label>CNPJ</label><input class="input" id="f-doc" placeholder="00.000.000/0001-00" maxlength="18" oninput="maskCNPJ(this)"></div>
            <div class="form-group"><label>Nome admin</label><input class="input" id="f-admin-name" required></div>
            <div class="form-group"><label>Email admin</label><input class="input" id="f-admin-email" type="email" required></div>
            <div class="form-group"><label>Senha admin</label><input class="input" id="f-admin-pass" placeholder="senha do admin" required></div>
            <button type="submit" class="btn btn-primary full" style="justify-content:center">Criar Escola + Admin</button>
          </div>
        </form>
      </div>
    `
    document.getElementById('create-form').onsubmit = async e => {
      e.preventDefault()
      const data = {
        name: document.getElementById('f-name').value,
        slug: document.getElementById('f-slug').value,
        document: document.getElementById('f-doc').value,
        adminName: document.getElementById('f-admin-name').value,
        adminEmail: document.getElementById('f-admin-email').value,
        adminPassword: document.getElementById('f-admin-pass').value,
      }
      try {
        await apiFetch('/api/organizations', { method: 'POST', body: JSON.stringify(data) })
        toggleForm()
        loadData()
      } catch (e) { alert(e.message) }
    }
  } else {
    form.style.display = 'none'
    form.innerHTML = ''
    btn.textContent = 'Nova Escola'
  }
}

window.logout = () => {
  token = null
  localStorage.removeItem('token')
  render()
}



function gerarSlug(texto) {
  return texto
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '')
}

function maskCNPJ(el) {
  let v = el.value.replace(/\D/g, '').substring(0, 14)
  if (v.length > 2) v = v.substring(0,2) + '.' + v.substring(2)
  if (v.length > 6) v = v.substring(0,6) + '.' + v.substring(6)
  if (v.length > 10) v = v.substring(0,10) + '/' + v.substring(10)
  if (v.length > 15) v = v.substring(0,15) + '-' + v.substring(15)
  el.value = v
}

function ce(tag, attrs) {
  const el = document.createElement(tag)
  if (attrs) { for (const k in attrs) el[k] = attrs[k] }
  return el
}

function render() {
  if (token) renderDashboard()
  else renderLogin()
}

render()
</script>
</body>
</html>
